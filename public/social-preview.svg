<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Lars Moelleken social preview</title>
  <desc id="desc">Social preview card for the Lars Moelleken portfolio with a dark background, cyan accent, and summary text.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="55%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="72" y="72" width="12" height="486" rx="6" fill="url(#accent)" />
  <circle cx="1010" cy="138" r="120" fill="#1e293b" opacity="0.55" />
  <circle cx="1088" cy="206" r="66" fill="#22d3ee" opacity="0.18" />
  <text x="120" y="178" fill="#22d3ee" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="8">VOKU</text>
  <text x="120" y="270" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800">Lars Moelleken</text>
  <text x="120" y="344" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="600">Software Systems Architect</text>
  <text x="120" y="424" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="28">Legacy modernization • open source • developer tooling</text>
  <text x="120" y="474" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="28">Portfolio built with React, TypeScript, Motion, and Vite</text>
  <rect x="120" y="520" width="340" height="2" fill="url(#accent)" />
</svg>
